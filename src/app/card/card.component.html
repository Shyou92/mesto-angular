<section class="card">
  <img src="{{ image }}" alt="user's card" class="card__image" />
  <div class="card__container">
    <p class="card__name">{{ title }}</p>
    <button
      class="card__like"
      type="button"
      (click)="toggleLike()"
      [ngClass]="isLiked ? 'card__like_active' : ''"
    ></button>
  </div>
</section>
